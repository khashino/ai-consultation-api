<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI RAG Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #f6f8fb;
      --sidebar: #0f172a;
      --sidebar-soft: #1e293b;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #dbeafe;
      --danger: #dc2626;
      --danger-dark: #b91c1c;
      --assistant-bg: #ffffff;
      --user-bg: #2563eb;
      --user-text: #ffffff;
      --shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.10), transparent 26%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button,
    textarea {
      font-family: inherit;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 310px 1fr;
    }

    .sidebar {
      background: linear-gradient(180deg, var(--sidebar), #111827);
      color: white;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .brand {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.35);
    }

    .brand h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 12px;
      color: #cbd5e1;
    }

    .sidebar-actions {
      padding: 14px;
      display: grid;
      gap: 9px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }

    button {
      border: none;
      border-radius: 13px;
      padding: 10px 13px;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
      background: var(--primary);
      color: white;
      transition: 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.10);
    }

    button.secondary:hover {
      background: rgba(255,255,255,0.14);
    }

    button.light {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid var(--border);
    }

    button.light:hover {
      background: #f8fafc;
    }

    button.danger {
      background: var(--danger);
    }

    button.danger:hover {
      background: var(--danger-dark);
    }

    .sessions-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .sessions-title {
      padding: 14px 16px 8px;
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 900;
    }

    .sessions {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px 14px;
    }

    .session-item {
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
      background: transparent;
      color: #e5e7eb;
      margin-bottom: 7px;
      border: 1px solid transparent;
      transition: 0.14s ease;
    }

    .session-item:hover {
      background: rgba(255,255,255,0.08);
    }

    .session-item.active {
      background: rgba(37, 99, 235, 0.24);
      border-color: rgba(147, 197, 253, 0.38);
    }

    .session-title {
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-meta {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 5px;
    }

    .sidebar-footer {
      padding: 14px;
      display: grid;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.10);
    }

    .chat-main {
      height: 100vh;
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .chat-header {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .chat-title-block {
      min-width: 0;
    }

    .chat-header h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 720px;
    }

    .chat-header p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex: 0 0 auto;
    }

    .chat-body {
      overflow-y: auto;
      padding: 28px 24px;
    }

    .empty-state {
      max-width: 760px;
      margin: 74px auto 0;
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 34px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .empty-icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 16px;
      border-radius: 20px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 22px;
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.25);
    }

    .empty-state h2 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.04em;
    }

    .empty-state p {
      margin: 10px auto 0;
      color: var(--muted);
      line-height: 1.6;
      max-width: 560px;
    }

    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

    .suggestion {
      text-align: left;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #f8fafc;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      line-height: 1.45;
      transition: 0.14s ease;
    }

    .suggestion:hover {
      background: #eff6ff;
      border-color: #bfdbfe;
      transform: translateY(-1px);
    }

    .message {
      max-width: 920px;
      margin: 0 auto 18px;
      display: flex;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 78%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .bubble.user {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 6px;
    }

    .bubble.assistant {
      background: var(--assistant-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
    }

    .message-time {
      margin-top: 7px;
      font-size: 11px;
      opacity: 0.68;
    }

    .composer-wrap {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 16px 22px 18px;
    }

    .composer {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .composer textarea {
      width: 100%;
      min-height: 54px;
      max-height: 180px;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid #cbd5e1;
      padding: 15px 16px;
      font-size: 15px;
      background: white;
      color: var(--text);
      outline: none;
      line-height: 1.45;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
    }

    .composer textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .composer button {
      min-width: 94px;
      height: 54px;
      border-radius: 18px;
    }

    .composer-help {
      max-width: 920px;
      margin: 8px auto 0;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .typing {
      max-width: 920px;
      margin: 0 auto 12px;
      color: var(--muted);
      font-size: 14px;
      display: none;
      padding: 0 24px;
    }

    .typing.active {
      display: block;
    }

    .typing-dots::after {
      content: "";
      animation: dots 1.2s infinite;
    }

    @keyframes dots {
      0% { content: ""; }
      33% { content: "."; }
      66% { content: ".."; }
      100% { content: "..."; }
    }

    .error-box {
      max-width: 920px;
      margin: 0 auto 12px;
      display: none;
      background: #fee2e2;
      color: #991b1b;
      padding: 11px 13px;
      border-radius: 12px;
      font-size: 14px;
      border: 1px solid #fecaca;
    }

    .error-box.active {
      display: block;
    }

    .mobile-menu-button {
      display: none;
    }

    .mobile-sidebar-backdrop {
      display: none;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: 310px;
        z-index: 40;
        transform: translateX(-105%);
        transition: 0.2s ease;
        box-shadow: 18px 0 40px rgba(15,23,42,0.28);
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .mobile-sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15,23,42,0.45);
        z-index: 30;
      }

      body.sidebar-open .mobile-sidebar-backdrop {
        display: block;
      }

      .mobile-menu-button {
        display: inline-flex;
      }

      .chat-header {
        padding: 14px;
      }

      .chat-header h1 {
        max-width: 360px;
        font-size: 19px;
      }

      .chat-body {
        padding: 18px 14px;
      }

      .empty-state {
        margin-top: 36px;
        padding: 24px;
      }

      .suggestions {
        grid-template-columns: 1fr;
      }

      .bubble {
        max-width: 92%;
      }

      .composer-wrap {
        padding: 12px;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .composer button {
        width: 100%;
      }
    }

    @media (max-width: 560px) {
      .header-actions .desktop-only {
        display: none;
      }

      .chat-header {
        align-items: flex-start;
      }

      .chat-header h1 {
        max-width: 230px;
      }

      .empty-state h2 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="mobile-sidebar-backdrop" onclick="closeSidebar()"></div>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">AI</div>
        <div>
          <h1>RAG Chat</h1>
          <p>Full chat workspace</p>
        </div>
      </div>

      <div class="sidebar-actions">
        <button onclick="newChat()">+ New Chat</button>
        <button class="secondary" onclick="loadSessions()">Refresh History</button>
      </div>

      <div class="sessions-wrap">
        <div class="sessions-title">Historical chats</div>
        <div id="sessionsList" class="sessions">Loading sessions...</div>
      </div>

      <div class="sidebar-footer">
        <button class="secondary" onclick="goToAdmin()">Admin Console</button>
        <button class="secondary" onclick="openChatDemo()">Widget Demo</button>
        <button class="danger" onclick="signOut()">Sign Out</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <div class="chat-title-block">
          <h1 id="chatTitle">New Chat</h1>
          <p id="chatSubtitle">Ask questions using your local knowledge base.</p>
        </div>

        <div class="header-actions">
          <button class="light mobile-menu-button" onclick="openSidebar()">History</button>
          <button class="light" onclick="newChat()">New Chat</button>
          <button class="light desktop-only" onclick="deleteCurrentSession()">Delete</button>
          <button class="light desktop-only" onclick="goToAdmin()">Admin</button>
          <button class="light desktop-only" onclick="signOut()">Sign Out</button>
        </div>
      </header>

      <section id="chatBody" class="chat-body"></section>

      <div id="typingIndicator" class="typing">
        <span class="typing-dots">Assistant is thinking</span>
      </div>

      <div id="errorBox" class="error-box"></div>

      <footer class="composer-wrap">
        <div class="composer">
          <textarea
            id="messageInput"
            placeholder="Message the RAG assistant..."
            onkeydown="handleComposerKeydown(event)"
          ></textarea>

          <button onclick="sendMessage()">Send</button>
        </div>

        <div class="composer-help">
          <span>Press Enter to send, Shift + Enter for a new line.</span>
          <span>Answers use your local knowledge base and saved session memory.</span>
        </div>
      </footer>
    </main>
  </div>

  <script>
    const API_BASE = "";

    let currentSessionId = null;
    let currentMessages = [];
    let isSending = false;

    function createSessionId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }

      return "session-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function newChat() {
      currentSessionId = createSessionId();
      currentMessages = [];

      document.getElementById("chatTitle").textContent = "New Chat";
      document.getElementById("chatSubtitle").textContent = "New session ready";
      document.getElementById("messageInput").value = "";

      renderMessages();
      setActiveSessionInSidebar();
      hideError();
      closeSidebar();

      document.getElementById("messageInput").focus();
    }

    async function loadSessions() {
      const sessionsList = document.getElementById("sessionsList");
      sessionsList.textContent = "Loading sessions...";

      try {
        const response = await fetch(`${API_BASE}/chat/sessions`, {
          credentials: "same-origin"
        });

        if (response.status === 401) {
          window.location.href = "/login";
          return;
        }

        const data = await response.json();

        if (!data.sessions || !data.sessions.length) {
          sessionsList.innerHTML = `
            <div class="session-item">
              <div class="session-title">No historical chats yet</div>
              <div class="session-meta">Start a new chat first.</div>
            </div>
          `;
          return;
        }

        sessionsList.innerHTML = data.sessions.map(session => `
          <div
            class="session-item ${session.session_id === currentSessionId ? "active" : ""}"
            onclick="loadSession('${escapeJs(session.session_id)}')"
          >
            <div class="session-title">${escapeHtml(makeSessionTitle(session))}</div>
            <div class="session-meta">${session.messages} messages</div>
            <div class="session-meta">Last: ${escapeHtml(session.last_message_at || "-")}</div>
          </div>
        `).join("");

      } catch (error) {
        sessionsList.textContent = "Error loading sessions: " + error.message;
      }
    }

    async function loadSession(sessionId) {
      currentSessionId = sessionId;
      currentMessages = [];
      hideError();
      closeSidebar();

      document.getElementById("chatTitle").textContent = "Loading chat...";
      document.getElementById("chatSubtitle").textContent = shortSessionId(sessionId);

      renderMessages();

      try {
        const response = await fetch(`${API_BASE}/chat/sessions/${encodeURIComponent(sessionId)}`, {
          credentials: "same-origin"
        });

        if (response.status === 401) {
          window.location.href = "/login";
          return;
        }

        const data = await response.json();

        currentMessages = Array.isArray(data.messages) ? data.messages : [];

        document.getElementById("chatTitle").textContent = getSessionDisplayTitle(currentMessages);
        document.getElementById("chatSubtitle").textContent = shortSessionId(sessionId);

        renderMessages();
        await loadSessions();

      } catch (error) {
        showError("Error loading session: " + error.message);
      }
    }

    async function sendMessage() {
      if (isSending) return;

      const input = document.getElementById("messageInput");
      const message = input.value.trim();

      if (!message) return;

      if (!currentSessionId) {
        currentSessionId = createSessionId();
      }

      isSending = true;
      hideError();

      const userMessage = {
        role: "user",
        content: message,
        created_at: new Date().toISOString()
      };

      currentMessages.push(userMessage);
      input.value = "";

      document.getElementById("chatTitle").textContent = getSessionDisplayTitle(currentMessages);
      document.getElementById("chatSubtitle").textContent = shortSessionId(currentSessionId);

      renderMessages();
      setTyping(true);

      const payload = {
        session_id: currentSessionId,
        message: message,
        topic: "general",
        user_country: null,
        target_country: null
      };

      try {
        const response = await fetch(`${API_BASE}/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload),
          credentials: "same-origin"
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "Chat request failed.");
        }

        const assistantMessage = {
          role: "assistant",
          content: data.answer || "No answer returned.",
          created_at: new Date().toISOString()
        };

        currentMessages.push(assistantMessage);

        renderMessages();
        await loadSessions();

      } catch (error) {
        showError(error.message);

        currentMessages.push({
          role: "assistant",
          content: "I could not generate a reliable answer.",
          created_at: new Date().toISOString()
        });

        renderMessages();

      } finally {
        isSending = false;
        setTyping(false);
        input.focus();
      }
    }

    async function deleteCurrentSession() {
      if (!currentSessionId) {
        return;
      }

      if (!currentMessages.length) {
        newChat();
        return;
      }

      const confirmed = confirm(`Delete this chat session?\n\n${currentSessionId}`);

      if (!confirmed) {
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/chat/sessions/${encodeURIComponent(currentSessionId)}`, {
          method: "DELETE",
          credentials: "same-origin"
        });

        if (response.status === 401) {
          window.location.href = "/login";
          return;
        }

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "Could not delete session.");
        }

        newChat();
        await loadSessions();

      } catch (error) {
        showError("Delete failed: " + error.message);
      }
    }

    function renderMessages() {
      const chatBody = document.getElementById("chatBody");

      if (!currentMessages.length) {
        chatBody.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">AI</div>
            <h2>Start a new RAG chat</h2>
            <p>
              Ask questions against your local knowledge base.
              Historical chats are saved and can be opened from the sidebar.
            </p>

            <div class="suggestions">
              <div class="suggestion" onclick="useSuggestion('What should I check for a Germany work visa?')">
                What should I check for a Germany work visa?
              </div>
              <div class="suggestion" onclick="useSuggestion('Summarize the key points from the knowledge base.')">
                Summarize the key points from the knowledge base.
              </div>
              <div class="suggestion" onclick="useSuggestion('Explain this in simpler language.')">
                Explain this in simpler language.
              </div>
              <div class="suggestion" onclick="useSuggestion('چه چیزهایی برای کیفیت RAG فارسی مهم است؟')">
                چه چیزهایی برای کیفیت RAG فارسی مهم است؟
              </div>
            </div>
          </div>
        `;
        return;
      }

      chatBody.innerHTML = currentMessages.map(message => {
        const role = message.role === "user" ? "user" : "assistant";

        return `
          <div class="message ${role}">
            <div class="bubble ${role}">
              ${escapeHtml(message.content)}
              <div class="message-time">${escapeHtml(formatTime(message.created_at))}</div>
            </div>
          </div>
        `;
      }).join("");

      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function useSuggestion(text) {
      document.getElementById("messageInput").value = text;
      document.getElementById("messageInput").focus();
    }

    function handleComposerKeydown(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    function setTyping(active) {
      const typingIndicator = document.getElementById("typingIndicator");

      if (active) {
        typingIndicator.classList.add("active");
      } else {
        typingIndicator.classList.remove("active");
      }
    }

    function showError(message) {
      const errorBox = document.getElementById("errorBox");
      errorBox.textContent = message;
      errorBox.classList.add("active");
    }

    function hideError() {
      const errorBox = document.getElementById("errorBox");
      errorBox.textContent = "";
      errorBox.classList.remove("active");
    }

    function makeSessionTitle(session) {
      return shortSessionId(session.session_id);
    }

    function getSessionDisplayTitle(messages) {
      const firstUserMessage = messages.find(message => message.role === "user");

      if (!firstUserMessage) {
        return "New Chat";
      }

      const text = firstUserMessage.content || "Chat";

      if (text.length <= 56) {
        return text;
      }

      return text.slice(0, 56) + "...";
    }

    function setActiveSessionInSidebar() {
      document.querySelectorAll(".session-item").forEach(item => {
        item.classList.remove("active");
      });
    }

    function shortSessionId(sessionId) {
      if (!sessionId) return "-";
      if (sessionId.length <= 18) return sessionId;
      return sessionId.slice(0, 8) + "..." + sessionId.slice(-6);
    }

    function formatTime(value) {
      if (!value) return "";

      try {
        const date = new Date(value);

        if (Number.isNaN(date.getTime())) {
          return value;
        }

        return date.toLocaleString();
      } catch {
        return value;
      }
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return "";

      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(text) {
      return String(text)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
    }

    function goToAdmin() {
      window.location.href = "/app";
    }

    function openChatDemo() {
      window.open("/chat-demo", "_blank");
    }

    function openSidebar() {
      document.body.classList.add("sidebar-open");
    }

    function closeSidebar() {
      document.body.classList.remove("sidebar-open");
    }

    async function signOut() {
      try {
        await fetch(`${API_BASE}/logout`, {
          method: "POST",
          credentials: "same-origin"
        });
      } catch (error) {
        console.warn("Logout request failed:", error);
      }

      window.location.href = "/login";
    }

    newChat();
    loadSessions();
  </script>
</body>
